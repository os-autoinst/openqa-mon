---

name: openqa-mon
'on': [push, pull_request]

jobs:
  openqa-mon:
    name: openqa-mon
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Setup go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with: &goversion
          go-version: '1.25'
      - name: Install requirements
        run: go mod download
      - name: Build openqa-mon
        run: make openqa-mon

  openqa-mq:
    name: openqa-mq
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Setup go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with: *goversion
      - name: Install requirements
        run: go mod download
      - name: Build openqa-mq
        run: make openqa-mq

  openqa-revtui:
    name: openqa-revtui
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Setup go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with: *goversion
      - name: Install requirements
        run: go mod download
      - name: Build openqa-review
        run: make openqa-revtui

  tomllint:
    name: "Linting _review files"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 'Checkout'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: 'Tomllint'
        uses: uncenter/setup-taplo@b18c8c8302695fe63d6853bc004006215ac52b91  # v2
      - run: taplo fmt --check _review/*.toml

